<VirtualHost *:80>
	ServerName rockwood.local

	ProxyPreserveHost On
	ProxyPass / http://127.0.0.1:8100/
	ProxyPassReverse / http://127.0.0.1:8100/
	RequestHeader set X-Forwarded-Proto "http"

	ErrorLog ${APACHE_LOG_DIR}/rockwood-error.log
	CustomLog ${APACHE_LOG_DIR}/rockwood-access.log combined
</VirtualHost>
